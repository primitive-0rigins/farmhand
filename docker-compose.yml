services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: farmhand
      POSTGRES_PASSWORD: farmhand
      POSTGRES_DB: farmhand
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U farmhand -d farmhand"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      FARMHAND_DATABASE_URL: postgresql+psycopg://farmhand:farmhand@postgres:5432/farmhand
      FARMHAND_ALLOWED_ORIGINS: http://localhost:8080
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  postgres-data:
